name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  LLVM_VERSION: 19
  GCC_VERSION: 14

jobs:
  build-and-test:
    name: "${{ matrix.preset }} (${{ matrix.compiler }})"
    runs-on: ubuntu-24.04
    
    strategy:
      fail-fast: false  # Не останавливать другие jobs при падении одного
      matrix:
        include:
          # ===== Debug + ASan builds =====
          - preset: dev-debug-asan
            compiler: clang
            cc: clang
            cxx: clang++
            
          - preset: dev-debug-asan
            compiler: gcc
            cc: gcc
            cxx: g++

          # ===== Release + Tests builds =====
          - preset: ci-tests-release
            compiler: clang
            cc: clang
            cxx: clang++
            
          - preset: ci-tests-release
            compiler: gcc
            cc: gcc
            cxx: g++

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== Установка LLVM/Clang =====
      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh ${{ env.LLVM_VERSION }} all
          
          # Симлинки для clang tools (format, tidy)
          sudo update-alternatives --install /usr/bin/clang-format clang-format \
            /usr/bin/clang-format-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
            /usr/bin/clang-tidy-${{ env.LLVM_VERSION }} 100

      # ===== Clang как компилятор =====
      - name: Setup Clang ${{ env.LLVM_VERSION }} as compiler
        if: matrix.compiler == 'clang'
        run: |
          sudo update-alternatives --install /usr/bin/clang clang \
            /usr/bin/clang-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ \
            /usr/bin/clang++-${{ env.LLVM_VERSION }} 100

      # ===== GCC как компилятор =====
      - name: Setup GCC ${{ env.GCC_VERSION }} as compiler
        if: matrix.compiler == 'gcc'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-${{ env.GCC_VERSION }} g++-${{ env.GCC_VERSION }}
          
          sudo update-alternatives --install /usr/bin/gcc gcc \
            /usr/bin/gcc-${{ env.GCC_VERSION }} 100
          sudo update-alternatives --install /usr/bin/g++ g++ \
            /usr/bin/g++-${{ env.GCC_VERSION }} 100

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Verify toolchain
        run: |
          echo "=== Compiler ==="
          ${{ matrix.cxx }} --version
          echo ""
          echo "=== Clang Tools ==="
          clang-format --version
          clang-tidy --version

      # ===== CMake Configure / Build / Test =====
      - name: Configure
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --verbose
        env:
          # Sanitizer options (игнорируются для release builds)
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:print_stats=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

      # ===== Артефакты для release =====
      - name: Upload artifacts
        if: matrix.preset == 'ci-tests-release'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.preset }}-${{ matrix.compiler }}
          path: build/${{ matrix.preset }}/
          retention-days: 7
